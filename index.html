<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="OW2 hero, perk, and team composition reference for a small group."
    >
    <title>OW2 Reference</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='8' fill='%230e1014'/%3E%3Cpath d='M14 18h9l9 15 9-15h9L36 40v10h-8V40L14 18z' fill='%23f3a13a'/%3E%3C/svg%3E"
    >
    <link rel="stylesheet" href="./styles.css?v=stage-initial-filter">
    <script src="./app.js?v=stage-initial-filter" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand" href="#heroes" aria-label="OW2 Reference">
          <span class="brand-mark">OW2</span>
          <span>
            <strong>OW2 Reference</strong>
            <small id="syncStatus">起動中</small>
          </span>
        </a>
        <nav class="top-actions" aria-label="Main">
          <a href="#heroes">Heroes</a>
          <a href="#comps">Comps</a>
          <a href="#sensitivity">Sens</a>
          <a href="#updates">Updates</a>
          <button id="refreshButton" type="button">更新</button>
        </nav>
      </header>

      <main>
        <section class="quick-board" aria-label="Hero meta stats">
          <div>
            <span class="eyebrow">Competitive Console Asia</span>
            <h1>ヒーロー性能、パーク、構成例</h1>
          </div>
          <div id="metaStats" class="meta-stats" aria-live="polite">
            <div class="mini-stat">
              <span>Pick</span>
              <strong>-</strong>
            </div>
            <div class="mini-stat">
              <span>Win</span>
              <strong>-</strong>
            </div>
            <div class="mini-stat">
              <span>Heroes</span>
              <strong>-</strong>
            </div>
          </div>
        </section>

        <section id="heroes" class="workspace" aria-label="Heroes">
          <div class="hero-controls">
            <label class="search-field">
              <span>Search</span>
              <input
                id="heroSearch"
                type="search"
                autocomplete="off"
                placeholder="Hero / ability / perk"
              >
            </label>
            <div class="segmented" aria-label="Role filter">
              <button class="is-active" type="button" data-role="all">All</button>
              <button type="button" data-role="tank">Tank</button>
              <button type="button" data-role="damage">Damage</button>
              <button type="button" data-role="support">Support</button>
              <button type="button" data-favorite-filter>★ Fav</button>
            </div>
          </div>

          <div class="hero-layout">
            <aside class="hero-rail" aria-label="Hero list">
              <div class="rail-head">
                <strong id="heroCount">0 Heroes</strong>
                <span id="detailProgress">Waiting</span>
              </div>
              <div id="heroList" class="hero-list" aria-live="polite"></div>
            </aside>

            <article id="heroDetail" class="hero-detail" aria-live="polite"></article>
          </div>
        </section>

        <section id="comps" class="comps-section" aria-label="Recommended compositions">
          <div class="section-head">
            <div>
              <span class="eyebrow">Recommended Comps</span>
              <h2>キャラ組み合わせ例</h2>
            </div>
            <span class="section-note">ステージ名から攻撃/防衛を表示</span>
          </div>

          <div class="comp-filters" aria-label="Composition filters">
            <label>
              <span>頭文字</span>
              <select id="compInitialFilter">
                <option value="all">すべて</option>
              </select>
            </label>
            <label>
              <span>ステージ名</span>
              <select id="compStageFilter">
                <option value="all">ステージを選択</option>
              </select>
            </label>
          </div>

          <div class="comp-helper" aria-label="Composition diagnosis">
            <div class="section-head compact">
              <div>
                <span class="eyebrow">Comp Check</span>
                <h3>組み合わせ診断</h3>
              </div>
              <span class="section-note">アンチパターンを確認</span>
            </div>
            <div class="diagnosis-controls">
              <label>
                <span>Tank</span>
                <select id="diagTank"></select>
              </label>
              <label>
                <span>Damage 1</span>
                <select id="diagDamage1"></select>
              </label>
              <label>
                <span>Damage 2</span>
                <select id="diagDamage2"></select>
              </label>
              <label>
                <span>Support 1</span>
                <select id="diagSupport1"></select>
              </label>
              <label>
                <span>Support 2</span>
                <select id="diagSupport2"></select>
              </label>
            </div>
            <div id="compDiagnosis" class="diagnosis-result" aria-live="polite"></div>
          </div>

          <div id="compGrid" class="comp-grid" aria-live="polite"></div>
        </section>

        <section id="sensitivity" class="sensitivity-section" aria-label="Console sensitivity helper">
          <div class="section-head">
            <div>
              <span class="eyebrow">Console Aim</span>
              <h2>感度調整補助</h2>
            </div>
            <span class="section-note">射撃場で1項目ずつ詰めるための目安</span>
          </div>

          <div class="sensitivity-tool">
            <div class="sens-controls" aria-label="Sensitivity inputs">
              <label>
                <span>ヒーロー</span>
                <select id="sensHero">
                  <option value="all">共通</option>
                </select>
              </label>
              <label>
                <span>操作タイプ</span>
                <select id="sensStyle">
                  <option value="balanced">バランス</option>
                  <option value="tracking">トラッキング重視</option>
                  <option value="flick">フリック重視</option>
                  <option value="scoped">スコープ重視</option>
                </select>
              </label>
              <label>
                <span>テスト結果</span>
                <select id="sensResult">
                  <option value="stable">大きな違和感なし</option>
                  <option value="overshoot">行き過ぎる</option>
                  <option value="undershoot">届かない</option>
                  <option value="shaky">細かく震える</option>
                  <option value="slow-turn">振り向きが遅い</option>
                </select>
              </label>
              <label>
                <span>水平感度</span>
                <input id="sensHorizontal" type="number" min="1" max="100" step="1" value="55">
              </label>
              <label>
                <span>垂直感度</span>
                <input id="sensVertical" type="number" min="1" max="100" step="1" value="45">
              </label>
              <label>
                <span>スコープ相対感度</span>
                <input id="sensScoped" type="number" min="1" max="100" step="1" value="45">
              </label>
              <label>
                <span>エイムアシスト強度</span>
                <input id="sensAssist" type="number" min="0" max="100" step="1" value="100">
              </label>
              <label>
                <span>アシストウィンドウ</span>
                <input id="sensWindow" type="number" min="0" max="100" step="1" value="35">
              </label>
              <label>
                <span>エイムスムージング</span>
                <input id="sensSmoothing" type="number" min="0" max="100" step="1" value="95">
              </label>
              <label>
                <span>エイムイーズイン</span>
                <input id="sensEaseIn" type="number" min="0" max="100" step="1" value="20">
              </label>
            </div>

            <div id="sensitivityResult" class="sensitivity-result" aria-live="polite"></div>
          </div>
        </section>

        <section id="updates" class="updates-section" aria-label="Patch notes and news">
          <div class="section-head">
            <div>
              <span class="eyebrow">Patch & News</span>
              <h2>パッチ・イベント・ニュース</h2>
            </div>
            <span class="section-note">直近1か月 + 今後の予定</span>
          </div>

          <div id="updateGrid" class="update-grid" aria-live="polite"></div>
        </section>
      </main>
    </div>
  </body>
</html>
